services:
  postgres:
    image: postgres:16-alpine
    container_name: devtrack-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-devtrack}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devtrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/DevTrack.Api/Dockerfile
    container_name: devtrack-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-devtrack};Username=${POSTGRES_USER:-devtrack};Password=${POSTGRES_PASSWORD}"
      Jwt__Issuer: ${JWT_ISSUER:-DevTrack}
      Jwt__Audience: ${JWT_AUDIENCE:-DevTrack}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__AccessTokenLifetimeDays: ${JWT_LIFETIME_DAYS:-7}
      DEVTRACK_AUTO_MIGRATE: "true"
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    networks:
      - devtrack-net

volumes:
  postgres_data:

networks:
  devtrack-net:
    driver: bridge
